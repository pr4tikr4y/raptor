<rect x=".75" y=".75" width="778.5" height="242.5" rx="11.5" fill="none" stroke="#19e3c6" stroke-width="1" opacity=".16"/>
<ellipse cx="390.0" cy="97.5" rx="320" ry="78" fill="url(#halo)"/>

<!-- corner tags -->
<text x="22" y="30" font-size="8.5" letter-spacing="1.2" fill="#3a5566">// recon-suite</text>
<text x="758" y="30" text-anchor="end" font-size="8.5" letter-spacing="1.2" fill="#3a5566">v1.0 · TARGET-LOCK</text>

<!-- scope alignment ticks -->
<g stroke="#f5a524" stroke-width="1.4" stroke-linecap="round" opacity=".62">
  <line x1="390.0" y1="35" x2="390.0" y2="42"/>
  <line x1="390.0" y1="153" x2="390.0" y2="160"/>
  <line x1="164.5" y1="97.5" x2="171.5" y2="97.5"/>
  <line x1="608.5" y1="97.5" x2="615.5" y2="97.5"/>
</g>

<!-- soft glow behind the letters (always visible, additive depth) -->
<use xlink:href="#cells" filter="url(#glow)" opacity=".45"/>

<!-- the wordmark: solid vector cells, ALWAYS visible -->
<use xlink:href="#cells"/>

<!-- scan beam: clipped to the letters, sweeps through them -->
<g clip-path="url(#cellclip)">
  <rect x="0" y="56" width="70" height="83" fill="url(#beam)" opacity=".9">
    <animateTransform attributeName="transform" type="translate"
      values="93.5 0;616.5 0;616.5 0" keyTimes="0;0.45;1" dur="4.6s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- lock-on reticle: base = locked & visible; SMIL adds the snap + breathe -->
<g fill="none" stroke="#f5a524" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
  <path d="M173.5 60 L173.5 44 L189.5 44" opacity=".9">
    <animateTransform attributeName="transform" type="translate" values="-9 -9;0 0" keyTimes="0;1" dur=".5s" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" values=".9;.5;.9" dur="3.4s" begin="1.6s" repeatCount="indefinite"/></path>
  <path d="M590.5 44 L606.5 44 L606.5 60" opacity=".9">
    <animateTransform attributeName="transform" type="translate" values="9 -9;0 0" keyTimes="0;1" dur=".5s" begin=".08s" fill="freeze"/>
    <animate attributeName="opacity" values=".9;.5;.9" dur="3.4s" begin="1.7s" repeatCount="indefinite"/></path>
  <path d="M173.5 135 L173.5 151 L189.5 151" opacity=".9">
    <animateTransform attributeName="transform" type="translate" values="-9 9;0 0" keyTimes="0;1" dur=".5s" begin=".16s" fill="freeze"/>
    <animate attributeName="opacity" values=".9;.5;.9" dur="3.4s" begin="1.8s" repeatCount="indefinite"/></path>
  <path d="M590.5 151 L606.5 151 L606.5 135" opacity=".9">
    <animateTransform attributeName="transform" type="translate" values="9 9;0 0" keyTimes="0;1" dur=".5s" begin=".24s" fill="freeze"/>
    <animate attributeName="opacity" values=".9;.5;.9" dur="3.4s" begin="1.9s" repeatCount="indefinite"/></path>
</g>

<!-- subtitle (always visible) -->
<text x="390.0" y="165" text-anchor="middle" font-size="9" letter-spacing="2.6" fill="#6493ab">RECON AUTOMATION PIPELINE FOR TARGET OPERATIONS &amp; REPORTING</text>

<!-- status line (always visible); only the cursor blinks -->
<text x="390.0" y="191" text-anchor="middle" font-size="9.5" letter-spacing="1.4">
  <tspan fill="#22c55e">●<animate attributeName="opacity" values="1;.35;1" dur="1.8s" repeatCount="indefinite"/></tspan><tspan fill="#5b7d8c"> SYSTEM ONLINE · RECON PIPELINE READY </tspan><tspan fill="#34d399">█<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;.5;.5;1" dur="1.05s" repeatCount="indefinite"/></tspan>
</text>
